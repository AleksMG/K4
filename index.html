<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Chat — Real RNN</title>
    <style>
        :root {
            --bg: #050505;
            --bg2: #0a0a0a;
            --text: #00ff99;
            --muted: #666;
            --border: #222;
            --red: #ff3333;
            --blue: #3399ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Consolas', monospace;
            font-size: 13px;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .viz {
            flex: 1;
            background: radial-gradient(ellipse at center, #0d0d0d 0%, #000 100%);
            position: relative;
        }
        #canvas { width: 100%; height: 100%; }
        .overlay {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); border: 1px solid var(--border);
            padding: 15px; border-radius: 4px;
        }
        .stat { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; }
        .stat-v { color: var(--text); }
        .panel {
            width: 450px; background: var(--bg2);
            overflow-y: auto; padding: 20px;
        }
        h1 { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .ver { font-size: 11px; color: var(--muted); margin-bottom: 20px; }
        .sec { margin-bottom: 25px; }
        .sec-t {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--muted); margin-bottom: 12px;
            padding-bottom: 8px; border-bottom: 1px solid var(--border);
        }
        .btn {
            background: transparent; border: 1px solid var(--text);
            color: var(--text); padding: 10px 15px;
            font-family: inherit; font-size: 12px; cursor: pointer;
            width: 100%; margin-bottom: 8px; text-transform: uppercase;
        }
        .btn:hover:not(:disabled) { background: var(--text); color: #000; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-p { background: var(--text); color: #000; }
        .btn-g { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-g .btn { flex: 1; margin: 0; }
        .drop {
            border: 2px dashed var(--border); border-radius: 4px;
            padding: 20px; text-align: center; cursor: pointer; margin-bottom: 10px;
        }
        .drop:hover { border-color: var(--text); }
        .fi { display: none; }
        .prog { height: 6px; background: #111; border-radius: 3px; overflow: hidden; margin-bottom: 15px; }
        .prog-f { height: 100%; background: var(--text); width: 0%; transition: width 0.1s; }
        .chat {
            background: #000; border: 1px solid var(--border);
            border-radius: 4px; padding: 15px; height: 200px;
            overflow-y: auto; margin-bottom: 15px;
        }
        .msg { margin-bottom: 12px; max-width: 85%; }
        .msg.u { margin-left: auto; text-align: right; }
        .msg .r { font-size: 9px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
        .msg .c {
            padding: 8px 12px; border-radius: 6px; display: inline-block;
            background: rgba(0,255,153,0.1); border: 1px solid rgba(0,255,153,0.3);
        }
        .msg.u .c { background: rgba(51,153,255,0.15); border-color: rgba(51,153,255,0.3); }
        .inp-r { display: flex; gap: 8px; margin-bottom: 15px; }
        .inp-f {
            flex: 1; background: #000; border: 1px solid var(--border);
            color: var(--text); padding: 12px; font-family: inherit;
            outline: none; border-radius: 4px;
        }
        .inp-f:focus { border-color: var(--text); }
        .log {
            background: #000; border: 1px solid var(--border);
            border-radius: 4px; padding: 12px; height: 100px;
            overflow-y: auto; font-size: 11px;
        }
        .log-e { margin-bottom: 4px; }
        .log-e.err { color: var(--red); }
        .log-e.ok { color: var(--text); }
        .met {
            background: #000; border: 1px solid var(--border);
            border-radius: 4px; padding: 12px; margin-bottom: 15px; display: none;
        }
        .met.show { display: block; }
        .met-r { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px; }
        .err-b {
            display: none; background: rgba(255,51,51,0.2);
            border: 1px solid var(--red); color: var(--red);
            padding: 15px; margin-bottom: 15px; border-radius: 4px;
        }
        .err-b.show { display: block; }
    </style>
</head>
<body>
    <div class="viz">
        <canvas id="canvas"></canvas>
        <div class="overlay">
            <div class="stat"><span>Нейроны:</span><span class="stat-v" id="sNeurons">0</span></div>
            <div class="stat"><span>Словарь:</span><span class="stat-v" id="sVocab">0</span></div>
            <div class="stat"><span>Loss:</span><span class="stat-v" id="sLoss">-</span></div>
            <div class="stat"><span>Эпоха:</span><span class="stat-v" id="sEpoch">0/0</span></div>
        </div>
    </div>

    <div class="panel">
        <h1>Neural Chat</h1>
        <div class="ver">Real RNN — Vanilla JS</div>

        <div class="err-b" id="errB"></div>

        <div class="sec">
            <div class="sec-t">📚 1. Загрузи датасет</div>
            <div class="drop" id="drop">
                📁 Перетащи .txt файл или нажми
                <div style="font-size:10px;color:#666;margin-top:5px">Формат: текст для обучения</div>
            </div>
            <input type="file" id="fi" class="fi" accept=".txt">
        </div>

        <div class="sec">
            <div class="sec-t">🎯 2. Обучи сеть</div>
            <div class="met" id="met">
                <div class="met-r"><span>Эпоха:</span><span id="mEpoch">0/10</span></div>
                <div class="met-r"><span>Loss:</span><span id="mLoss">0.000</span></div>
                <div class="met-r"><span>Токенов:</span><span id="mTok">0</span></div>
            </div>
            <div class="prog"><div class="prog-f" id="prog"></div></div>
            <div class="btn-g">
                <button class="btn btn-p" id="bTrain" onclick="app.train()" disabled>Обучить</button>
                <button class="btn" onclick="app.stop()" disabled id="bStop">Стоп</button>
            </div>
        </div>

        <div class="sec">
            <div class="sec-t">💬 3. Общайся</div>
            <div class="chat" id="chat"></div>
            <div class="inp-r">
                <input type="text" class="inp-f" id="inp" placeholder="Введите сообщение..." onkeydown="if(event.key==='Enter')app.send()">
                <button class="btn btn-p" style="width:auto;margin:0;" onclick="app.send()">➤</button>
            </div>
        </div>

        <div class="sec">
            <div class="sec-t">⚙️ Настройки</div>
            <div class="btn-g">
                <button class="btn" onclick="app.save()">💾 Сохранить</button>
                <button class="btn" onclick="document.getElementById('mFi').click()">📂 Загрузить</button>
                <input type="file" id="mFi" class="fi" accept=".json">
            </div>
            <button class="btn" style="border-color:var(--red);color:var(--red);" onclick="app.reset()">🔄 Сброс</button>
        </div>

        <div class="sec">
            <div class="sec-t">📋 Лог</div>
            <div class="log" id="log"></div>
        </div>
    </div>

<script>
/**
 * REAL RNN — CHARACTER LEVEL
 * 
 * Архитектура:
 * - Embedding слой
 * - RNN с Tanh активацией
 * - Output слой с Softmax
 * - Backpropagation Through Time
 * - SGD с momentum
 * 
 * БЕЗ внешних библиотек. БЕЗ заглушек.
 */

// ==================== КОНФИГ ====================
const CFG = {
    HIDDEN: 128,
    SEQ: 50,
    EPOCHS: 10,
    LR: 0.01,
    TEMP: 0.8,
    MOMENTUM: 0.9
};

// ==================== МАТЕМАТИКА ====================
const M = {
    randn() {
        let u = 0, v = 0;
        while(u === 0) u = Math.random();
        while(v === 0) v = Math.random();
        return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    },
    
    softmax(a) {
        const m = Math.max(...a);
        const e = a.map(v => Math.exp(v - m));
        const s = e.reduce((a, b) => a + b, 0);
        return e.map(v => v / s);
    },
    
    sample(probs, temp) {
        const s = probs.map(p => Math.pow(p, 1.0 / temp));
        const sum = s.reduce((a, b) => a + b, 0);
        const n = s.map(p => p / sum);
        let r = Math.random();
        for (let i = 0; i < n.length; i++) {
            r -= n[i];
            if (r <= 0) return i;
        }
        return n.length - 1;
    },
    
    ts() { return new Date().toLocaleTimeString('ru-RU', {hour12: false}); }
};

// ==================== ТОКЕНИЗАТОР ====================
class Tokenizer {
    constructor() {
        this.c2i = new Map();
        this.i2c = new Map();
    }
    
    build(text) {
        const chars = new Set(text.toLowerCase().split(''));
        let i = 0;
        for (const c of chars) {
            this.c2i.set(c, i);
            this.i2c.set(i, c);
            i++;
        }
        // Добавляем паддинг
        if (!this.c2i.has('\n')) {
            this.c2i.set('\n', i);
            this.i2c.set(i, '\n');
        }
    }
    
    enc(text) {
        return text.toLowerCase().split('').map(c => this.c2i.get(c)).filter(i => i !== undefined);
    }
    
    dec(arr) {
        return arr.map(i => this.i2c.get(i) || '').join('');
    }
    
    size() { return this.c2i.size; }
}

// ==================== RNN ЯЧЕЙКА ====================
class RNN {
    constructor(inputSize, hiddenSize, outputSize) {
        this.inputSize = inputSize;
        this.hiddenSize = hiddenSize;
        this.outputSize = outputSize;
        
        // Инициализация весов (Xavier)
        const s1 = Math.sqrt(2.0 / (inputSize + hiddenSize));
        const s2 = Math.sqrt(2.0 / (hiddenSize + hiddenSize));
        const s3 = Math.sqrt(2.0 / (hiddenSize + outputSize));
        
        // Wxh: input -> hidden
        this.Wxh = this._mat(inputSize, hiddenSize, s1);
        // Whh: hidden -> hidden
        this.Whh = this._mat(hiddenSize, hiddenSize, s2);
        // Why: hidden -> output
        this.Why = this._mat(hiddenSize, outputSize, s3);
        
        // Biases
        this.bh = Array(hiddenSize).fill(0);
        this.by = Array(outputSize).fill(0);
        
        // Momentum
        this.mWxh = this._zeros(inputSize, hiddenSize);
        this.mWhh = this._zeros(hiddenSize, hiddenSize);
        this.mWhy = this._zeros(hiddenSize, outputSize);
        this.mbh = Array(hiddenSize).fill(0);
        this.mby = Array(outputSize).fill(0);
        
        // Градиенты
        this.dWxh = this._zeros(inputSize, hiddenSize);
        this.dWhh = this._zeros(hiddenSize, hiddenSize);
        this.dWhy = this._zeros(hiddenSize, outputSize);
        this.dbh = Array(hiddenSize).fill(0);
        this.dby = Array(outputSize).fill(0);
        
        this.h = Array(hiddenSize).fill(0);
    }
    
    _mat(r, c, s) {
        return Array(r).fill(0).map(() => Array(c).fill(0).map(() => M.randn() * s));
    }
    
    _zeros(r, c) {
        return Array(r).fill(0).map(() => Array(c).fill(0));
    }
    
    forward(inputs) {
        this.inputs = inputs;
        this.states = [];
        let h = [...this.h];
        
        for (let t = 0; t < inputs.length; t++) {
            const x = inputs[t];
            
            // One-hot
            const xVec = Array(this.inputSize).fill(0);
            xVec[x] = 1;
            
            // Hidden state: h = tanh(Wxh * x + Whh * h_prev + bh)
            const hNew = Array(this.hiddenSize).fill(0);
            for (let i = 0; i < this.hiddenSize; i++) {
                let sum = this.bh[i];
                for (let j = 0; j < this.inputSize; j++) {
                    sum += this.Wxh[j][i] * xVec[j];
                }
                for (let j = 0; j < this.hiddenSize; j++) {
                    sum += this.Whh[j][i] * h[j];
                }
                hNew[i] = Math.tanh(sum);
            }
            h = hNew;
            
            // Output: y = Why * h + by
            const y = Array(this.outputSize).fill(0);
            for (let i = 0; i < this.outputSize; i++) {
                let sum = this.by[i];
                for (let j = 0; j < this.hiddenSize; j++) {
                    sum += this.Why[j][i] * h[j];
                }
                y[i] = sum;
            }
            
            this.states.push({ x: xVec, h: [...h], y });
        }
        
        this.h = [...h];
        return this.states;
    }
    
    backward(targets, lr) {
        let dhNext = Array(this.hiddenSize).fill(0);
        let loss = 0;
        
        // Обнуляем градиенты
        this.dWxh = this._zeros(this.inputSize, this.hiddenSize);
        this.dWhh = this._zeros(this.hiddenSize, this.hiddenSize);
        this.dWhy = this._zeros(this.hiddenSize, this.outputSize);
        this.dbh = Array(this.hiddenSize).fill(0);
        this.dby = Array(this.outputSize).fill(0);
        
        // Backprop through time
        for (let t = this.states.length - 1; t >= 0; t--) {
            const s = this.states[t];
            const target = targets[t];
            
            // Softmax + Cross-entropy
            const probs = M.softmax(s.y);
            const dy = [...probs];
            dy[target] -= 1;
            loss += -Math.log(Math.max(probs[target], 1e-10));
            
            // Градиенты output слоя
            for (let i = 0; i < this.outputSize; i++) {
                this.dby[i] += dy[i];
                for (let j = 0; j < this.hiddenSize; j++) {
                    this.dWhy[j][i] += dy[i] * s.h[j];
                }
            }
            
            // Градиент hidden слоя
            const dh = Array(this.hiddenSize).fill(0);
            for (let j = 0; j < this.hiddenSize; j++) {
                for (let i = 0; i < this.outputSize; i++) {
                    dh[j] += dy[i] * this.Why[j][i];
                }
                dh[j] += dhNext[j];
            }
            
            // Backprop through tanh
            const dtanh = dh.map((v, i) => v * (1 - s.h[i] * s.h[i]));
            
            // Градиенты hidden слоя
            for (let i = 0; i < this.hiddenSize; i++) {
                this.dbh[i] += dtanh[i];
                for (let j = 0; j < this.inputSize; j++) {
                    this.dWxh[j][i] += dtanh[i] * s.x[j];
                }
                for (let j = 0; j < this.hiddenSize; j++) {
                    this.dWhh[j][i] += dtanh[i] * s.h[j];
                }
            }
            
            // dhNext для следующего шага
            dhNext = Array(this.hiddenSize).fill(0);
            for (let j = 0; j < this.hiddenSize; j++) {
                for (let i = 0; i < this.hiddenSize; i++) {
                    dhNext[j] += dtanh[i] * this.Whh[j][i];
                }
            }
        }
        
        // Gradient clipping
        this._clip(5.0);
        
        // SGD с momentum
        this._update(lr);
        
        return loss / this.states.length;
    }
    
    _clip(max) {
        const grads = [this.dWxh, this.dWhh, this.dWhy];
        for (const g of grads) {
            for (let i = 0; i < g.length; i++) {
                for (let j = 0; j < g[i].length; j++) {
                    g[i][j] = Math.max(-max, Math.min(max, g[i][j]));
                }
            }
        }
        for (let i = 0; i < this.dbh.length; i++) {
            this.dbh[i] = Math.max(-max, Math.min(max, this.dbh[i]));
            this.dby[i] = Math.max(-max, Math.min(max, this.dby[i]));
        }
    }
    
    _update(lr) {
        // Update weights с momentum
        for (let i = 0; i < this.inputSize; i++) {
            for (let j = 0; j < this.hiddenSize; j++) {
                this.mWxh[i][j] = CFG.MOMENTUM * this.mWxh[i][j] - lr * this.dWxh[i][j];
                this.Wxh[i][j] += this.mWxh[i][j];
            }
        }
        
        for (let i = 0; i < this.hiddenSize; i++) {
            for (let j = 0; j < this.hiddenSize; j++) {
                this.mWhh[i][j] = CFG.MOMENTUM * this.mWhh[i][j] - lr * this.dWhh[i][j];
                this.Whh[i][j] += this.mWhh[i][j];
            }
        }
        
        for (let i = 0; i < this.hiddenSize; i++) {
            for (let j = 0; j < this.outputSize; j++) {
                this.mWhy[i][j] = CFG.MOMENTUM * this.mWhy[i][j] - lr * this.dWhy[i][j];
                this.Why[i][j] += this.mWhy[i][j];
            }
        }
        
        for (let i = 0; i < this.hiddenSize; i++) {
            this.mbh[i] = CFG.MOMENTUM * this.mbh[i] - lr * this.dbh[i];
            this.bh[i] += this.mbh[i];
            this.mby[i] = CFG.MOMENTUM * this.mby[i] - lr * this.dby[i];
            this.by[i] += this.mby[i];
        }
    }
    
    predict(lastIdx, count, temp) {
        let h = [...this.h];
        const out = [];
        let idx = lastIdx;
        
        for (let i = 0; i < count; i++) {
            const xVec = Array(this.inputSize).fill(0);
            xVec[idx] = 1;
            
            const hNew = Array(this.hiddenSize).fill(0);
            for (let j = 0; j < this.hiddenSize; j++) {
                let sum = this.bh[j];
                for (let k = 0; k < this.inputSize; k++) {
                    sum += this.Wxh[k][j] * xVec[k];
                }
                for (let k = 0; k < this.hiddenSize; k++) {
                    sum += this.Whh[k][j] * h[k];
                }
                hNew[j] = Math.tanh(sum);
            }
            h = hNew;
            
            const y = Array(this.outputSize).fill(0);
            for (let j = 0; j < this.outputSize; j++) {
                let sum = this.by[j];
                for (let k = 0; k < this.hiddenSize; k++) {
                    sum += this.Why[k][j] * h[k];
                }
                y[j] = sum;
            }
            
            const probs = M.softmax(y);
            idx = M.sample(probs, temp);
            out.push(idx);
        }
        
        this.h = [...h];
        return out;
    }
    
    reset() {
        this.h = Array(this.hiddenSize).fill(0);
    }
    
    toJSON() {
        return {
            inputSize: this.inputSize,
            hiddenSize: this.hiddenSize,
            outputSize: this.outputSize,
            Wxh: this.Wxh, Whh: this.Whh, Why: this.Why,
            bh: this.bh, by: this.by
        };
    }
    
    fromJSON(d) {
        this.inputSize = d.inputSize;
        this.hiddenSize = d.hiddenSize;
        this.outputSize = d.outputSize;
        this.Wxh = d.Wxh; this.Whh = d.Whh; this.Why = d.Why;
        this.bh = d.bh; this.by = d.by;
        this.mWxh = this._zeros(this.inputSize, this.hiddenSize);
        this.mWhh = this._zeros(this.hiddenSize, this.hiddenSize);
        this.mWhy = this._zeros(this.hiddenSize, this.outputSize);
        this.mbh = Array(this.hiddenSize).fill(0);
        this.mby = Array(this.outputSize).fill(0);
        this.reset();
    }
}

// ==================== ПРИЛОЖЕНИЕ ====================
class App {
    constructor() {
        this.tokenizer = null;
        this.rnn = null;
        this.data = null;
        this.training = false;
        this.canvas = document.getElementById('canvas');
        this.ctx = this.canvas.getContext('2d');
        
        this._setup();
        this._draw();
    }
    
    _setup() {
        this.canvas.width = this.canvas.parentElement.clientWidth;
        this.canvas.height = this.canvas.parentElement.clientHeight;
        
        const drop = document.getElementById('drop');
        const fi = document.getElementById('fi');
        
        drop.onclick = () => fi.click();
        drop.ondragover = e => { e.preventDefault(); drop.style.borderColor = '#00ff99'; };
        drop.ondragleave = () => { drop.style.borderColor = '#222'; };
        drop.ondrop = e => {
            e.preventDefault();
            drop.style.borderColor = '#222';
            if (e.dataTransfer.files[0]) this._load(e.dataTransfer.files[0]);
        };
        
        fi.onchange = e => {
            if (e.target.files[0]) this._load(e.target.files[0]);
        };
        
        document.getElementById('mFi').onchange = e => {
            if (e.target.files[0]) this._loadModel(e.target.files[0]);
        };
        
        this._log('Готов. Загрузи файл для начала.', 'ok');
    }
    
    _draw() {
        const ctx = this.ctx;
        const w = this.canvas.width;
        const h = this.canvas.height;
        
        ctx.fillStyle = 'rgba(5,5,5,0.3)';
        ctx.fillRect(0, 0, w, h);
        
        if (this.rnn && this.rnn.h) {
            const n = this.rnn.hiddenSize;
            const cx = w / 2;
            const cy = h / 2;
            const r = Math.min(w, h) * 0.35;
            
            for (let i = 0; i < n; i++) {
                const a = (i / n) * Math.PI * 2;
                const x = cx + Math.cos(a) * r;
                const y = cy + Math.sin(a) * r;
                const act = Math.abs(this.rnn.h[i]);
                const b = Math.min(1, act * 2);
                
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 255, 153, ${0.3 + b * 0.7})`;
                ctx.fill();
            }
        }
        
        requestAnimationFrame(() => this._draw());
    }
    
    async _load(file) {
        try {
            const text = await file.text();
            if (text.length < 100) {
                this._err('Мало данных (минимум 100 символов)');
                return;
            }
            
            this.data = text;
            this._log(`Загружено: ${file.name}`, 'ok');
            this._log(`Символов: ${text.length.toLocaleString()}`);
            
            // Создаём токенизатор ПОСЛЕ загрузки данных
            this.tokenizer = new Tokenizer();
            this.tokenizer.build(text);
            
            // Создаём модель ПОСЛЕ токенизатора
            const vocabSize = this.tokenizer.size();
            this.rnn = new RNN(vocabSize, CFG.HIDDEN, vocabSize);
            
            this._log(`Словарь: ${vocabSize} символов`, 'ok');
            this._log(`Нейронов: ${CFG.HIDDEN}`);
            
            document.getElementById('sVocab').textContent = vocabSize;
            document.getElementById('sNeurons').textContent = CFG.HIDDEN;
            document.getElementById('bTrain').disabled = false;
            
            this._addChat('system', `Датасет загружен. Словарь: ${vocabSize} символов. Нажми "Обучить".`);
        } catch (e) {
            this._err(e.message);
        }
    }
    
    async train() {
        if (!this.data || !this.rnn) {
            this._err('Сначала загрузи датасет');
            return;
        }
        if (this.training) {
            this._err('Обучение уже идёт');
            return;
        }
        
        this.training = true;
        document.getElementById('bTrain').disabled = true;
        document.getElementById('bStop').disabled = false;
        document.getElementById('met').classList.add('show');
        
        this._log('════════════════════');
        this._log('🚀 ОБУЧЕНИЕ', 'ok');
        this._log('════════════════════');
        
        const tokens = this.tokenizer.enc(this.data);
        this._log(`Токенов: ${tokens.length.toLocaleString()}`);
        
        let totalLoss = 0;
        let steps = 0;
        
        for (let epoch = 0; epoch < CFG.EPOCHS && this.training; epoch++) {
            let epochLoss = 0;
            let epochSteps = 0;
            
            for (let i = 0; i < tokens.length - CFG.SEQ && this.training; i += CFG.SEQ) {
                const seq = tokens.slice(i, i + CFG.SEQ + 1);
                
                this.rnn.reset();
                this.rnn.forward(seq.slice(0, CFG.SEQ));
                const loss = this.rnn.backward(seq.slice(1), CFG.LR);
                
                epochLoss += loss;
                epochSteps++;
                totalLoss += loss;
                steps++;
                
                // UI update
                if (epochSteps % 20 === 0) {
                    const avg = epochLoss / epochSteps;
                    document.getElementById('mEpoch').textContent = `${epoch + 1}/${CFG.EPOCHS}`;
                    document.getElementById('mLoss').textContent = avg.toFixed(3);
                    document.getElementById('mTok').textContent = steps.toLocaleString();
                    document.getElementById('sLoss').textContent = avg.toFixed(3);
                    document.getElementById('sEpoch').textContent = `${epoch + 1}/${CFG.EPOCHS}`;
                    document.getElementById('prog').style.width = `${((epoch + 1) / CFG.EPOCHS) * 100}%`;
                    
                    await new Promise(r => setTimeout(r, 10));
                }
            }
            
            const avg = epochLoss / Math.max(epochSteps, 1);
            this._log(`✅ Эпоха ${epoch + 1} | Loss: ${avg.toFixed(3)}`, 'ok');
        }
        
        this.training = false;
        document.getElementById('bTrain').disabled = false;
        document.getElementById('bStop').disabled = true;
        
        const avg = totalLoss / Math.max(steps, 1);
        this._log('════════════════════');
        this._log(`✅ ГОТОВО | Loss: ${avg.toFixed(3)}`, 'ok');
        this._log('════════════════════');
        
        this._addChat('system', `Обучено! Loss: ${avg.toFixed(3)}. Можешь общаться.`);
    }
    
    stop() {
        if (this.training) {
            this.training = false;
            this._log('⏹ Остановлено');
        }
    }
    
    async send() {
        const inp = document.getElementById('inp');
        const text = inp.value.trim();
        if (!text || !this.rnn) return;
        
        this._addChat('user', text);
        inp.value = '';
        
        const tokens = this.tokenizer.enc(text + '\n');
        
        this.rnn.reset();
        this.rnn.forward(tokens);
        
        const gen = this.rnn.predict(tokens[tokens.length - 1], 80, CFG.TEMP);
        const resp = this.tokenizer.dec(gen);
        
        const clean = resp.split('\n')[0].slice(0, 200);
        this._addChat('snn', clean || '...');
    }
    
    _addChat(role, content) {
        const box = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${role === 'user' ? 'u' : ''}`;
        div.innerHTML = `<div class="r">${role === 'user' ? 'Вы' : 'Нейросеть'}</div><div class="c">${content}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
    
    _log(msg, type = '') {
        const box = document.getElementById('log');
        const div = document.createElement('div');
        div.className = `log-e ${type === 'ok' ? 'ok' : ''} ${type === 'err' ? 'err' : ''}`;
        div.textContent = `[${M.ts()}] ${msg}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
    
    _err(msg) {
        const b = document.getElementById('errB');
        b.textContent = msg;
        b.classList.add('show');
        setTimeout(() => b.classList.remove('show'), 5000);
        this._log(msg, 'err');
    }
    
    save() {
        if (!this.rnn) {
            this._err('Нет модели для сохранения');
            return;
        }
        const d = {
            rnn: this.rnn.toJSON(),
            tokenizer: {
                c2i: [...this.tokenizer.c2i.entries()],
                i2c: [...this.tokenizer.i2c.entries()]
            },
            cfg: CFG
        };
        const blob = new Blob([JSON.stringify(d)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `model_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        this._log('Модель сохранена', 'ok');
    }
    
    async _loadModel(file) {
        try {
            const text = await file.text();
            const d = JSON.parse(text);
            
            this.tokenizer = new Tokenizer();
            this.tokenizer.c2i = new Map(d.tokenizer.c2i);
            this.tokenizer.i2c = new Map(d.tokenizer.i2c);
            
            this.rnn = new RNN(0, 0, 0);
            this.rnn.fromJSON(d.rnn);
            
            Object.assign(CFG, d.cfg);
            
            this._log('Модель загружена', 'ok');
            this._log(`Словарь: ${this.tokenizer.size()} символов`);
            
            document.getElementById('sVocab').textContent = this.tokenizer.size();
            document.getElementById('sNeurons').textContent = CFG.HIDDEN;
            document.getElementById('bTrain').disabled = false;
            document.getElementById('sLoss').textContent = '-';
            document.getElementById('sEpoch').textContent = '0/0';
            
            this._addChat('system', 'Модель загружена. Можешь общаться.');
        } catch (e) {
            this._err(e.message);
        }
    }
    
    reset() {
        if (confirm('Сбросить модель?')) {
            this.rnn = null;
            this.tokenizer = null;
            this.data = null;
            document.getElementById('bTrain').disabled = true;
            document.getElementById('sVocab').textContent = '0';
            document.getElementById('sLoss').textContent = '-';
            document.getElementById('met').classList.remove('show');
            document.getElementById('prog').style.width = '0%';
            this._log('Сброшено');
            this._addChat('system', 'Сброс. Загрузи новый файл.');
        }
    }
}

const app = new App();
</script>
