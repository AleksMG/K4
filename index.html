<script>
'use strict';

// ===========================================
// КОНФИГУРАЦИЯ - ТОЛЬКО ФУТБОЛ
// ===========================================
const FOOTBALL_CONFIG = {
    FIELD: { width: 1000, height: 600 },
    GOAL: { 
        width: 160,  // ширина ворот
        y: 300,
        postTop: 220,
        postBottom: 380 
    },
    BALL: { 
        radius: 8, 
        friction: 0.98,
        maxSpeed: 25
    },
    PLAYER: {
        radius: 15,
        maxSpeed: 9,
        maxSpeedWithBall: 6.5,
        acceleration: 0.15,
        passSpeed: 18,
        shotSpeed: 22,
        passAccuracy: 0.82,
        shotAccuracy: 0.75,
        interceptRadius: 35,
        kickCooldown: 15
    },
    POSITIONS: {
        goalkeeper: { attack: { x: 50, y: 300 }, defend: { x: 50, y: 300 } },
        defender: { attack: { x: 250, y: 300 }, defend: { x: 150, y: 300 } },
        midfielder: { attack: { x: 500, y: 300 }, defend: { x: 400, y: 300 } },
        forward: { attack: { x: 800, y: 300 }, defend: { x: 600, y: 300 } }
    }
};

// ===========================================
// CORTEX-2 BRAIN (СОКРАЩЕННАЯ ВЕРСИЯ ДЛЯ ФУТБОЛА)
// ===========================================
class Cortex2Brain {
    constructor(config = {}) {
        this.seed = config.seed || 'football_cortex_' + Date.now();
        this.lr = config.lr || 0.01;
        this.gamma = 0.99;
        this.lambda = 0.95;
        
        // Размеры слоев
        this.INPUT_DIM = 64;
        this.HIDDEN1 = 48;
        this.HIDDEN2 = 32;
        this.OUTPUT_DIM = 16;
        
        // Инициализация весов
        this.W1 = this._initMatrix(this.INPUT_DIM, this.HIDDEN1, 0.1);
        this.b1 = this._initVector(this.HIDDEN1, 0);
        
        this.W2 = this._initMatrix(this.HIDDEN1, this.HIDDEN2, 0.1);
        this.b2 = this._initVector(this.HIDDEN2, 0);
        
        this.W3 = this._initMatrix(this.HIDDEN2, this.OUTPUT_DIM, 0.1);
        this.b3 = this._initVector(this.OUTPUT_DIM, 0);
        
        // Critic (оценка ценности)
        this.Wv = this._initVector(this.HIDDEN2, 0.1);
        this.bv = 0;
        
        // Состояние
        this.h1 = new Float32Array(this.HIDDEN1);
        this.h2 = new Float32Array(this.HIDDEN2);
        this.output = new Float32Array(this.OUTPUT_DIM);
        
        // Для обучения
        this.traces = [];
        this.stats = { tdErrors: [] };
    }
    
    _initMatrix(rows, cols, scale) {
        const mat = [];
        for (let i = 0; i < rows; i++) {
            const row = new Float32Array(cols);
            for (let j = 0; j < cols; j++) {
                row[j] = (Math.random() * 2 - 1) * scale;
            }
            mat.push(row);
        }
        return mat;
    }
    
    _initVector(len, scale) {
        const vec = new Float32Array(len);
        for (let i = 0; i < len; i++) {
            vec[i] = (Math.random() * 2 - 1) * scale;
        }
        return vec;
    }
    
    _relu(x) { return x > 0 ? x : 0.01 * x; }
    _tanh(x) { 
        if (x > 20) return 1;
        if (x < -20) return -1;
        const e = Math.exp(2 * x);
        return (e - 1) / (e + 1);
    }
    _sigmoid(x) { return 1 / (1 + Math.exp(-x)); }
    
    forward(inputs) {
        if (!inputs || inputs.length !== this.INPUT_DIM) {
            inputs = new Array(this.INPUT_DIM).fill(0);
        }
        
        // Слой 1
        for (let i = 0; i < this.HIDDEN1; i++) {
            let sum = this.b1[i];
            for (let j = 0; j < this.INPUT_DIM; j++) {
                sum += inputs[j] * this.W1[j][i];
            }
            this.h1[i] = this._relu(sum);
        }
        
        // Слой 2
        for (let i = 0; i < this.HIDDEN2; i++) {
            let sum = this.b2[i];
            for (let j = 0; j < this.HIDDEN1; j++) {
                sum += this.h1[j] * this.W2[j][i];
            }
            this.h2[i] = this._relu(sum);
        }
        
        // Выходной слой
        for (let i = 0; i < this.OUTPUT_DIM; i++) {
            let sum = this.b3[i];
            for (let j = 0; j < this.HIDDEN2; j++) {
                sum += this.h2[j] * this.W3[j][i];
            }
            this.output[i] = this._tanh(sum);
        }
        
        // Ценность состояния (для обучения)
        let value = this.bv;
        for (let i = 0; i < this.HIDDEN2; i++) {
            value += this.h2[i] * this.Wv[i];
        }
        
        return {
            output: Array.from(this.output),
            value: this._tanh(value),
            hidden: Array.from(this.h2)
        };
    }
    
    mutate(rate = 0.05) {
        let mutations = 0;
        
        // Мутация весов
        for (let i = 0; i < this.W1.length; i++) {
            for (let j = 0; j < this.W1[i].length; j++) {
                if (Math.random() < rate) {
                    this.W1[i][j] += (Math.random() * 2 - 1) * 0.1;
                    mutations++;
                }
            }
        }
        
        for (let i = 0; i < this.W2.length; i++) {
            for (let j = 0; j < this.W2[i].length; j++) {
                if (Math.random() < rate) {
                    this.W2[i][j] += (Math.random() * 2 - 1) * 0.1;
                    mutations++;
                }
            }
        }
        
        return mutations;
    }
    
    clone() {
        const clone = new Cortex2Brain({ seed: this.seed + '_clone' });
        clone.W1 = this.W1.map(r => r.slice());
        clone.W2 = this.W2.map(r => r.slice());
        clone.W3 = this.W3.map(r => r.slice());
        clone.Wv = this.Wv.slice();
        clone.b1 = this.b1.slice();
        clone.b2 = this.b2.slice();
        clone.b3 = this.b3.slice();
        clone.bv = this.bv;
        return clone;
    }
}

// ===========================================
// МЯЧ - ПРАВИЛЬНАЯ ФИЗИКА
// ===========================================
class FootballBall {
    constructor(x, y) {
        this.x = x || 500;
        this.y = y || 300;
        this.vx = 0;
        this.vy = 0;
        this.owner = null; // ID игрока, кто последний коснулся
        this.lastTouchTeam = null;
        this.radius = FOOTBALL_CONFIG.BALL.radius;
        this.trail = [];
    }
    
    update() {
        // Движение
        this.x += this.vx;
        this.y += this.vy;
        
        // Трение
        this.vx *= FOOTBALL_CONFIG.BALL.friction;
        this.vy *= FOOTBALL_CONFIG.BALL.friction;
        
        if (Math.abs(this.vx) < 0.1) this.vx = 0;
        if (Math.abs(this.vy) < 0.1) this.vy = 0;
        
        // Максимальная скорость
        const speed = Math.hypot(this.vx, this.vy);
        if (speed > FOOTBALL_CONFIG.BALL.maxSpeed) {
            const scale = FOOTBALL_CONFIG.BALL.maxSpeed / speed;
            this.vx *= scale;
            this.vy *= scale;
        }
        
        // Границы поля (с учетом ворот)
        const goalTop = FOOTBALL_CONFIG.GOAL.postTop;
        const goalBottom = FOOTBALL_CONFIG.GOAL.postBottom;
        
        // Левая граница
        if (this.x < this.radius) {
            if (this.y >= goalTop && this.y <= goalBottom) {
                // ГОЛ! обрабатывается в world
            } else {
                this.vx *= -0.5;
                this.x = this.radius;
            }
        }
        
        // Правая граница
        if (this.x > FOOTBALL_CONFIG.FIELD.width - this.radius) {
            if (this.y >= goalTop && this.y <= goalBottom) {
                // ГОЛ!
            } else {
                this.vx *= -0.5;
                this.x = FOOTBALL_CONFIG.FIELD.width - this.radius;
            }
        }
        
        // Верх/низ
        if (this.y < this.radius) {
            this.vy *= -0.5;
            this.y = this.radius;
        }
        if (this.y > FOOTBALL_CONFIG.FIELD.height - this.radius) {
            this.vy *= -0.5;
            this.y = FOOTBALL_CONFIG.FIELD.height - this.radius;
        }
        
        // След
        if (this.trail.length === 0 || 
            Math.hypot(this.trail[0].x - this.x, this.trail[0].y - this.y) > 20) {
            this.trail.unshift({ x: this.x, y: this.y, age: 0 });
            if (this.trail.length > 10) this.trail.pop();
        }
        this.trail.forEach(t => t.age++);
        
        // Сброс владения если мяч далеко
        if (this.owner) {
            const owner = window.arenaGame?.world?.getAgent(this.owner);
            if (!owner || Math.hypot(owner.x - this.x, owner.y - this.y) > 40) {
                this.owner = null;
            }
        }
    }
    
    kick(angle, power, playerId) {
        this.vx = Math.cos(angle) * power;
        this.vy = Math.sin(angle) * power;
        this.owner = playerId;
    }
    
    checkGoal() {
        const goalTop = FOOTBALL_CONFIG.GOAL.postTop;
        const goalBottom = FOOTBALL_CONFIG.GOAL.postBottom;
        
        // Гол в левые ворота
        if (this.x < 0 && this.y > goalTop && this.y < goalBottom) {
            return { team: 'red', x: 0, y: this.y };
        }
        
        // Гол в правые ворота
        if (this.x > FOOTBALL_CONFIG.FIELD.width && this.y > goalTop && this.y < goalBottom) {
            return { team: 'blue', x: FOOTBALL_CONFIG.FIELD.width, y: this.y };
        }
        
        return null;
    }
    
    draw(ctx) {
        // След
        if (this.trail.length > 1) {
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 3;
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for (let i = 1; i < this.trail.length; i++) {
                ctx.lineTo(this.trail[i].x, this.trail[i].y);
            }
            ctx.stroke();
        }
        
        // Мяч
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        
        // Пятна
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(this.x - 3, this.y - 2, 2, 0, Math.PI * 2);
        ctx.arc(this.x + 3, this.y + 2, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ===========================================
// ИГРОК - ФУТБОЛЬНАЯ МЕХАНИКА
// ===========================================
class FootballPlayer {
    constructor(id, team, role, x, y, color) {
        this.id = id;
        this.team = team;
        this.role = role;
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.color = color;
        
        // Состояние
        this.hasBall = false;
        this.kickCooldown = 0;
        this.stamina = 100;
        
        // Характеристики (будут влиять на выходы Cortex)
        this.stats = {
            speed: 7 + Math.random() * 2,
            passAcc: 0.7 + Math.random() * 0.2,
            shotAcc: 0.6 + Math.random() * 0.2,
            aggression: 0.3 + Math.random() * 0.4
        };
        
        // Мозг
        this.net = new Cortex2Brain({ seed: `${team}_${role}_${id}` });
        
        // Текущее решение
        this.decision = {
            action: 'move',
            targetX: x,
            targetY: y,
            targetPlayer: null,
            power: 0
        };
        
        // История для отладки
        this.lastDecision = null;
        this.inputs = new Array(64).fill(0);
    }
    
    // ========== СБОР ВХОДНЫХ ДАННЫХ ==========
    getInputs(ball, teammates, opponents) {
        const inputs = new Array(64).fill(0);
        const maxDist = 500;
        
        // 0-1: позиция мяча относительно игрока
        inputs[0] = (ball.x - this.x) / maxDist;
        inputs[1] = (ball.y - this.y) / maxDist;
        
        // 2-3: скорость мяча
        inputs[2] = ball.vx / 20;
        inputs[3] = ball.vy / 20;
        
        // 4: дистанция до мяча
        inputs[4] = Math.min(Math.hypot(ball.x - this.x, ball.y - this.y) / maxDist, 1);
        
        // 5-6: ворота противника
        const enemyGoalX = this.team === 'blue' ? FOOTBALL_CONFIG.FIELD.width : 0;
        inputs[5] = (enemyGoalX - this.x) / maxDist;
        inputs[6] = (FOOTBALL_CONFIG.GOAL.y - this.y) / maxDist;
        
        // 7-8: свои ворота
        const myGoalX = this.team === 'blue' ? 0 : FOOTBALL_CONFIG.FIELD.width;
        inputs[7] = (myGoalX - this.x) / maxDist;
        
        // 9-12: ближайший партнер
        if (teammates.length > 0) {
            const nearest = teammates[0];
            inputs[9] = (nearest.x - this.x) / maxDist;
            inputs[10] = (nearest.y - this.y) / maxDist;
            inputs[11] = Math.min(Math.hypot(nearest.x - this.x, nearest.y - this.y) / maxDist, 1);
        }
        
        // 13-16: ближайший соперник
        if (opponents.length > 0) {
            const nearest = opponents[0];
            inputs[13] = (nearest.x - this.x) / maxDist;
            inputs[14] = (nearest.y - this.y) / maxDist;
            inputs[15] = Math.min(Math.hypot(nearest.x - this.x, nearest.y - this.y) / maxDist, 1);
        }
        
        // 17: есть ли мяч
        inputs[17] = this.hasBall ? 1 : 0;
        
        // 18-19: куда должен бежать по роли
        let targetX, targetY;
        if (this.team === 'blue') {
            targetX = this.role === 'forward' ? 800 : 
                     this.role === 'midfielder' ? 500 : 
                     this.role === 'defender' ? 250 : 50;
        } else {
            targetX = this.role === 'forward' ? 200 : 
                     this.role === 'midfielder' ? 500 : 
                     this.role === 'defender' ? 750 : 950;
        }
        targetY = this.role === 'goalkeeper' ? 300 : 
                 300 + (parseInt(this.id.split('_')[1]) - 3) * 50;
        
        inputs[18] = (targetX - this.x) / maxDist;
        inputs[19] = (targetY - this.y) / maxDist;
        
        // 20: выносливость
        inputs[20] = this.stamina / 100;
        
        // 21-22: скорость игрока
        inputs[21] = this.vx / 10;
        inputs[22] = this.vy / 10;
        
        this.inputs = inputs;
        return inputs;
    }
    
    // ========== ИНТЕРПРЕТАЦИЯ ВЫХОДОВ CORTEX ==========
    setOutput(output, value) {
        // output[0] - движение вправо/влево (-1..1)
        // output[1] - движение вверх/вниз (-1..1)
        // output[2] - пас (0..1)
        // output[3] - удар (0..1)
        // output[4] - отбор/агрессия (0..1)
        // output[5] - дриблинг/скорость (0..1)
        // output[6..15] - запасные
        
        // Сохраняем решение
        this.lastDecision = {
            output: output.slice(),
            value: value,
            action: 'idle'
        };
        
        // Базовая скорость
        const speedBase = this.hasBall ? 
            FOOTBALL_CONFIG.PLAYER.maxSpeedWithBall : 
            FOOTBALL_CONFIG.PLAYER.maxSpeed;
        
        // Влияние выносливости
        const staminaFactor = 0.5 + this.stamina / 200;
        
        // Движение
        const moveX = output[0] * speedBase * staminaFactor;
        const moveY = output[1] * speedBase * staminaFactor;
        
        // Плавное ускорение
        this.vx += (moveX - this.vx) * FOOTBALL_CONFIG.PLAYER.acceleration;
        this.vy += (moveY - this.vy) * FOOTBALL_CONFIG.PLAYER.acceleration;
        
        // Действия
        if (output[2] > 0.7 && this.hasBall && this.kickCooldown <= 0) {
            this.lastDecision.action = 'pass';
        } else if (output[3] > 0.7 && this.hasBall && this.kickCooldown <= 0) {
            this.lastDecision.action = 'shoot';
        } else if (output[4] > 0.7 && !this.hasBall) {
            this.lastDecision.action = 'tackle';
        } else if (output[5] > 0.5 && this.hasBall) {
            this.lastDecision.action = 'dribble';
        } else {
            this.lastDecision.action = 'move';
        }
        
        // Выносливость
        if (Math.abs(output[0]) > 0.5 || Math.abs(output[1]) > 0.5) {
            this.stamina = Math.max(0, this.stamina - 0.1);
        } else {
            this.stamina = Math.min(100, this.stamina + 0.05);
        }
    }
    
    // ========== ДВИЖЕНИЕ ==========
    move() {
        this.x += this.vx;
        this.y += this.vy;
        
        // Трение
        this.vx *= 0.95;
        this.vy *= 0.95;
        
        // Границы
        this.x = Math.max(20, Math.min(FOOTBALL_CONFIG.FIELD.width - 20, this.x));
        this.y = Math.max(20, Math.min(FOOTBALL_CONFIG.FIELD.height - 20, this.y));
        
        if (this.kickCooldown > 0) this.kickCooldown--;
    }
    
    // ========== ПАС ==========
    pass(ball, teammates, opponents) {
        if (!this.hasBall) return null;
        
        // Ищем лучшую цель
        let bestTarget = null;
        let bestScore = -Infinity;
        
        for (const mate of teammates) {
            if (mate.id === this.id) continue;
            
            const dx = mate.x - this.x;
            const dy = mate.y - this.y;
            const dist = Math.hypot(dx, dy);
            
            // Не пасуем слишком близко или слишком далеко
            if (dist < 50 || dist > 350) continue;
            
            // Проверка на перехват
            let interceptRisk = 0;
            for (const opp of opponents) {
                const distToLine = Math.abs(
                    (opp.y - this.y) * dx - (opp.x - this.x) * dy
                ) / dist;
                
                if (distToLine < 40) {
                    interceptRisk += (1 - distToLine / 40) * 
                                     (1 - Math.hypot(opp.x - mate.x, opp.y - mate.y) / 200);
                }
            }
            
            // Оценка
            let score = 1000 / dist;
            score -= interceptRisk * 300;
            
            // Нападающий в штрафной - приоритет
            if (mate.role === 'forward' && 
                ((this.team === 'blue' && mate.x > 700) || 
                 (this.team === 'red' && mate.x < 300))) {
                score += 200;
            }
            
            if (score > bestScore) {
                bestScore = score;
                bestTarget = mate;
            }
        }
        
        if (!bestTarget) return null;
        
        // Расчет паса с упреждением
        const dx = bestTarget.x - this.x;
        const dy = bestTarget.y - this.y;
        const dist = Math.hypot(dx, dy);
        
        // Время полета
        const flightTime = dist / FOOTBALL_CONFIG.PLAYER.passSpeed;
        
        // Предсказание позиции принимающего
        const interceptX = bestTarget.x + bestTarget.vx * flightTime;
        const interceptY = bestTarget.y + bestTarget.vy * flightTime;
        
        // Угол паса
        const angle = Math.atan2(interceptY - this.y, interceptX - this.x);
        
        // Точность
        const accuracy = this.stats.passAcc * FOOTBALL_CONFIG.PLAYER.passAccuracy;
        const error = (1 - accuracy) * 0.15;
        const finalAngle = angle + (Math.random() - 0.5) * error;
        
        // Сила паса
        const power = Math.min(dist * 0.9, FOOTBALL_CONFIG.PLAYER.passSpeed);
        
        // Пас
        ball.kick(finalAngle, power, this.id);
        this.hasBall = false;
        this.kickCooldown = FOOTBALL_CONFIG.PLAYER.kickCooldown;
        
        return {
            type: 'pass',
            from: this.id,
            to: bestTarget.id,
            power,
            angle: finalAngle
        };
    }
    
    // ========== УДАР ==========
    shoot(ball) {
        const enemyGoalX = this.team === 'blue' ? 
            FOOTBALL_CONFIG.FIELD.width : 0;
        
        const distToGoal = Math.abs(enemyGoalX - this.x);
        
        // Сила удара от расстояния
        let power;
        if (distToGoal < 100) power = 14;
        else if (distToGoal < 200) power = 18;
        else power = 22;
        
        // Цель - угол ворот
        const targetY = FOOTBALL_CONFIG.GOAL.y + (Math.random() > 0.5 ? -40 : 40);
        
        const dx = enemyGoalX - this.x;
        const dy = targetY - this.y;
        const angle = Math.atan2(dy, dx);
        
        // Точность
        const accuracy = this.stats.shotAcc * FOOTBALL_CONFIG.PLAYER.shotAccuracy;
        const error = (1 - accuracy) * 0.12;
        const finalAngle = angle + (Math.random() - 0.5) * error;
        
        // Удар
        ball.kick(finalAngle, power, this.id);
        this.hasBall = false;
        this.kickCooldown = FOOTBALL_CONFIG.PLAYER.kickCooldown;
        
        return {
            type: 'shot',
            from: this.id,
            power,
            targetY
        };
    }
    
    // ========== ОТБОР ==========
    tackle(ball, opponents) {
        // Ищем ближайшего соперника с мячом
        const opponentWithBall = opponents.find(o => o.hasBall);
        if (!opponentWithBall) return null;
        
        const dist = Math.hypot(opponentWithBall.x - this.x, opponentWithBall.y - this.y);
        
        if (dist < 30) {
            // Шанс отбора
            const tackleChance = 0.4 + this.stats.aggression * 0.3;
            
            if (Math.random() < tackleChance) {
                // Отбор
                ball.owner = this.id;
                this.hasBall = true;
                opponentWithBall.hasBall = false;
                
                // Мяч отлетает
                const angle = Math.atan2(this.y - opponentWithBall.y, this.x - opponentWithBall.x);
                ball.kick(angle, 3, this.id);
                
                this.kickCooldown = 10;
                
                return {
                    type: 'tackle_success',
                    opponent: opponentWithBall.id
                };
            } else {
                // Неудачный отбор
                this.vx += (this.x - opponentWithBall.x) * 0.2;
                this.vy += (this.y - opponentWithBall.y) * 0.2;
                
                return {
                    type: 'tackle_fail',
                    opponent: opponentWithBall.id
                };
            }
        }
        
        return null;
    }
    
    // ========== ПЕРЕХВАТ ==========
    intercept(ball) {
        if (this.hasBall || ball.owner === this.id || !ball.owner) return false;
        
        const dist = Math.hypot(ball.x - this.x, ball.y - this.y);
        
        if (dist < 40 && Math.hypot(ball.vx, ball.vy) > 2) {
            // Предсказание траектории
            const futureX = ball.x + ball.vx * 0.5;
            const futureY = ball.y + ball.vy * 0.5;
            
            const interceptDist = Math.hypot(futureX - this.x, futureY - this.y);
            
            if (interceptDist < 30) {
                // Перехват
                ball.vx *= 0.3;
                ball.vy *= 0.3;
                ball.owner = this.id;
                this.hasBall = true;
                this.kickCooldown = 5;
                
                return true;
            }
        }
        
        return false;
    }
    
    // ========== ВЕДЕНИЕ ==========
    dribble(ball) {
        if (!this.hasBall) return;
        
        // Мяч должен быть перед игроком
        const desiredBallX = this.x + Math.cos(this.lastDecision?.angle || 0) * 20;
        const desiredBallY = this.y + Math.sin(this.lastDecision?.angle || 0) * 20;
        
        const ballDist = Math.hypot(ball.x - desiredBallX, ball.y - desiredBallY);
        
        if (ballDist > 10) {
            // Подправляем мяч
            const angle = Math.atan2(desiredBallY - ball.y, desiredBallX - ball.x);
            ball.kick(angle, 2, this.id);
        }
    }
    
    // ========== ОБНОВЛЕНИЕ ==========
    update(ball, teammates, opponents) {
        // Получаем входные данные
        const inputs = this.getInputs(ball, teammates, opponents);
        
        // Forward через Cortex
        const result = this.net.forward(inputs);
        
        // Применяем выход
        this.setOutput(result.output, result.value);
        
        // Выполняем действие
        let event = null;
        
        switch(this.lastDecision.action) {
            case 'pass':
                event = this.pass(ball, teammates, opponents);
                break;
            case 'shoot':
                event = this.shoot(ball);
                break;
            case 'tackle':
                event = this.tackle(ball, opponents);
                break;
            case 'dribble':
                this.dribble(ball);
                break;
        }
        
        // Перехват
        if (!this.hasBall && Math.random() < 0.1) {
            this.intercept(ball);
        }
        
        // Движение
        this.move();
        
        // Обновляем владение
        const distToBall = Math.hypot(ball.x - this.x, ball.y - this.y);
        
        if (!this.hasBall && ball.owner === this.id) {
            this.hasBall = true;
        }
        
        if (this.hasBall && distToBall > 25) {
            this.hasBall = false;
        }
        
        if (!this.hasBall && !ball.owner && distToBall < 15) {
            ball.owner = this.id;
            this.hasBall = true;
        }
        
        return event;
    }
    
    draw(ctx, showVision) {
        // Игрок
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, FOOTBALL_CONFIG.PLAYER.radius, 0, Math.PI * 2);
        ctx.fill();
        
        // Роль
        ctx.fillStyle = 'white';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(this.role[0].toUpperCase(), this.x, this.y - 20);
        
        // Если с мячом
        if (this.hasBall) {
            ctx.strokeStyle = 'yellow';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(this.x, this.y, FOOTBALL_CONFIG.PLAYER.radius + 3, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        // Выносливость
        ctx.fillStyle = '#333';
        ctx.fillRect(this.x - 15, this.y - 25, 30, 3);
        ctx.fillStyle = this.stamina > 50 ? '#00ff9d' : '#ff4444';
        ctx.fillRect(this.x - 15, this.y - 25, 30 * (this.stamina / 100), 3);
        
        // Vision
        if (showVision) {
            ctx.strokeStyle = 'rgba(0,255,0,0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 200, 0, Math.PI * 2);
            ctx.stroke();
        }
    }
}

// ===========================================
// МИР - ОСНОВНОЙ ЦИКЛ
// ===========================================
class FootballWorld {
    constructor() {
        this.ball = new FootballBall(500, 300);
        this.players = [];
        this.score = { blue: 0, red: 0 };
        this.time = 0;
        this.step = 0;
        this.events = [];
        
        this.teamPlayers = {
            blue: [],
            red: []
        };
    }
    
    spawnPlayers(count = 6) {
        this.players = [];
        this.teamPlayers.blue = [];
        this.teamPlayers.red = [];
        
        const colors = { blue: '#00aaff', red: '#ff5500' };
        
        // Синяя команда
        const blueRoles = [
            'goalkeeper',
            'defender', 'defender',
            'midfielder', 'midfielder',
            'forward'
        ];
        
        for (let i = 0; i < count; i++) {
            const role = blueRoles[i % blueRoles.length];
            let x, y;
            
            switch(role) {
                case 'goalkeeper': x = 50; y = 300; break;
                case 'defender': x = 200; y = 200 + (i % 2) * 200; break;
                case 'midfielder': x = 400; y = 250 + (i % 2) * 100; break;
                case 'forward': x = 700; y = 300; break;
                default: x = 500; y = 300;
            }
            
            const player = new FootballPlayer(
                `blue_${i}`,
                'blue',
                role,
                x + (Math.random() * 20 - 10),
                y + (Math.random() * 20 - 10),
                colors.blue
            );
            
            this.players.push(player);
            this.teamPlayers.blue.push(player);
        }
        
        // Красная команда
        const redRoles = [
            'goalkeeper',
            'defender', 'defender',
            'midfielder', 'midfielder',
            'forward'
        ];
        
        for (let i = 0; i < count; i++) {
            const role = redRoles[i % redRoles.length];
            let x, y;
            
            switch(role) {
                case 'goalkeeper': x = 950; y = 300; break;
                case 'defender': x = 800; y = 200 + (i % 2) * 200; break;
                case 'midfielder': x = 600; y = 250 + (i % 2) * 100; break;
                case 'forward': x = 300; y = 300; break;
                default: x = 500; y = 300;
            }
            
            const player = new FootballPlayer(
                `red_${i}`,
                'red',
                role,
                x + (Math.random() * 20 - 10),
                y + (Math.random() * 20 - 10),
                colors.red
            );
            
            this.players.push(player);
            this.teamPlayers.red.push(player);
        }
    }
    
    getAgent(id) {
        return this.players.find(p => p.id === id);
    }
    
    update() {
        this.step++;
        this.time = this.step / 60;
        
        // Обновляем мяч
        this.ball.update();
        
        // Сортируем игроков по дистанции до мяча (для обработки)
        const playersByDistance = [...this.players].sort((a, b) => {
            const da = Math.hypot(a.x - this.ball.x, a.y - this.ball.y);
            const db = Math.hypot(b.x - this.ball.x, b.y - this.ball.y);
            return da - db;
        });
        
        // Обновляем игроков
        this.events = [];
        
        for (const player of playersByDistance) {
            const teammates = this.teamPlayers[player.team].filter(p => p.id !== player.id);
            const opponents = this.teamPlayers[player.team === 'blue' ? 'red' : 'blue'];
            
            const event = player.update(this.ball, teammates, opponents);
            if (event) this.events.push(event);
        }
        
        // Проверка гола
        const goal = this.ball.checkGoal();
        if (goal) {
            this.score[goal.team]++;
            this.resetAfterGoal();
        }
        
        // Мутация каждые 1000 шагов
        if (this.step % 1000 === 0) {
            this.mutatePlayers();
        }
    }
    
    resetAfterGoal() {
        // Сброс мяча
        this.ball = new FootballBall(500, 300);
        
        // Возврат игроков на позиции
        this.players.forEach(player => {
            if (player.team === 'blue') {
                switch(player.role) {
                    case 'goalkeeper': player.x = 50; player.y = 300; break;
                    case 'defender': player.x = 200; player.y = player.id.includes('0') ? 200 : 400; break;
                    case 'midfielder': player.x = 400; player.y = player.id.includes('2') ? 250 : 350; break;
                    case 'forward': player.x = 700; player.y = 300; break;
                }
            } else {
                switch(player.role) {
                    case 'goalkeeper': player.x = 950; player.y = 300; break;
                    case 'defender': player.x = 800; player.y = player.id.includes('0') ? 200 : 400; break;
                    case 'midfielder': player.x = 600; player.y = player.id.includes('2') ? 250 : 350; break;
                    case 'forward': player.x = 300; player.y = 300; break;
                }
            }
            player.vx = 0;
            player.vy = 0;
            player.hasBall = false;
        });
        
        this.ball.owner = null;
    }
    
    mutatePlayers() {
        // Мутируем случайных игроков
        for (const player of this.players) {
            if (Math.random() < 0.1) {
                const mutations = player.net.mutate(0.1);
                if (mutations > 0) {
                    console.log(`🧬 Мутация у ${player.id}: ${mutations} изменений`);
                }
            }
        }
    }
    
    draw(ctx, vision = false) {
        // Поле
        ctx.fillStyle = '#1a5c1a';
        ctx.fillRect(0, 0, FOOTBALL_CONFIG.FIELD.width, FOOTBALL_CONFIG.FIELD.height);
        
        // Разметка
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        
        // Линии
        ctx.strokeRect(10, 10, FOOTBALL_CONFIG.FIELD.width - 20, FOOTBALL_CONFIG.FIELD.height - 20);
        
        // Центр
        ctx.beginPath();
        ctx.moveTo(FOOTBALL_CONFIG.FIELD.width / 2, 10);
        ctx.lineTo(FOOTBALL_CONFIG.FIELD.width / 2, FOOTBALL_CONFIG.FIELD.height - 10);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(FOOTBALL_CONFIG.FIELD.width / 2, FOOTBALL_CONFIG.FIELD.height / 2, 60, 0, Math.PI * 2);
        ctx.stroke();
        
        // Вратарские
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(0, 220, 20, 160);
        ctx.fillRect(FOOTBALL_CONFIG.FIELD.width - 20, 220, 20, 160);
        
        // Игроки
        this.players.forEach(p => p.draw(ctx, vision));
        
        // Мяч
        this.ball.draw(ctx);
        
        // Счет
        ctx.fillStyle = 'white';
        ctx.font = 'bold 36px Arial';
        ctx.fillText(this.score.blue, 400, 80);
        ctx.fillText(this.score.red, 560, 80);
        
        // Время
        ctx.font = '24px Arial';
        const minutes = Math.floor(this.time / 60);
        const seconds = Math.floor(this.time % 60);
        ctx.fillText(`${minutes}:${seconds.toString().padStart(2, '0')}`, 450, 130);
    }
}

// ===========================================
// ДВИЖОК ИГРЫ
// ===========================================
class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        
        this.world = new FootballWorld();
        this.world.spawnPlayers(6);
        
        this.running = false;
        this.lastTime = 0;
        this.fps = 60;
        this.vision = false;
        
        this.setupCanvas();
        this.setupEvents();
    }
    
    setupCanvas() {
        const resize = () => {
            this.canvas.width = FOOTBALL_CONFIG.FIELD.width;
            this.canvas.height = FOOTBALL_CONFIG.FIELD.height;
        };
        resize();
        window.addEventListener('resize', resize);
    }
    
    setupEvents() {
        document.getElementById('btnStart').onclick = () => this.toggle();
        document.getElementById('btnReset').onclick = () => this.reset();
        
        document.getElementById('agentCount').oninput = (e) => {
            document.getElementById('agentCountValue').textContent = e.target.value;
        };
        
        document.getElementById('agentSpeed').oninput = (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('agentSpeedValue').textContent = val;
            FOOTBALL_CONFIG.PLAYER.maxSpeed = val;
        };
        
        document.getElementById('viewRadius').oninput = (e) => {
            document.getElementById('viewRadiusValue').textContent = e.target.value;
        };
        
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                this.toggle();
            } else if (e.key === 'v') {
                this.vision = !this.vision;
            }
        });
    }
    
    toggle() {
        this.running = !this.running;
        const btn = document.getElementById('btnStart');
        btn.textContent = this.running ? '⏸ ПАУЗА' : '▶ СТАРТ';
        if (this.running) {
            this.lastTime = performance.now();
            this.loop();
        }
    }
    
    reset() {
        this.running = false;
        document.getElementById('btnStart').textContent = '▶ СТАРТ';
        
        const count = parseInt(document.getElementById('agentCount').value);
        this.world = new FootballWorld();
        this.world.spawnPlayers(count);
    }
    
    loop() {
        if (!this.running) return;
        
        const now = performance.now();
        const delta = now - this.lastTime;
        
        if (delta > 16) {
            this.fps = Math.round(1000 / delta);
            document.getElementById('fpsCounter').textContent = `FPS: ${this.fps}`;
            
            // Обновление мира
            this.world.update();
            
            // Обновление UI
            document.getElementById('scoreBlue').textContent = this.world.score.blue;
            document.getElementById('scoreRed').textContent = this.world.score.red;
            
            const minutes = Math.floor(this.world.time / 60);
            const seconds = Math.floor(this.world.time % 60);
            document.getElementById('matchTime').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Отрисовка
            this.world.draw(this.ctx, this.vision);
            
            this.lastTime = now;
        }
        
        requestAnimationFrame(() => this.loop());
    }
}
