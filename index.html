<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRU Neural Engine v4.1</title>
  
  <!-- ═══════════════════════════════════════════════════════════════════════
       СТИЛИ (Ванильный CSS, без внешних зависимостей)
       ═══════════════════════════════════════════════════════════════════════ -->
  <style>
    :root {
      --bg: #020203;
      --surface: #08090b;
      --border: #12131a;
      --text: #e2e2e8;
      --muted: #5a5a6e;
      --accent: #00ffa3;
      --accent-dim: rgba(0, 255, 163, 0.08);
      --error: #ff5577;
      --user-msg: rgba(0, 255, 163, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       МАКЕТ
       ═══════════════════════════════════════════════════════════════════════ */
    .layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      height: 100%;
      background: var(--border);
    }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
    }

    .chat-col {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .sidebar {
      background: var(--surface);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       ВЕРХНЯЯ ПАНЕЛЬ
       ═══════════════════════════════════════════════════════════════════════ */
    .top-bar {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
      font-size: 1.1rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }

    .status-dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .status-dot.error {
      background: var(--error);
      box-shadow: 0 0 8px var(--error);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       ЧАТ
       ═══════════════════════════════════════════════════════════════════════ */
    .chat-flow {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 80%;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    .msg.user {
      align-self: flex-end;
    }

    .msg.ai {
      align-self: flex-start;
    }

    .bubble {
      padding: 0.8rem 1rem;
      border-radius: 10px;
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--accent-dim);
      border: 1px solid rgba(0, 255, 163, 0.15);
      border-radius: 10px 10px 2px 10px;
    }

    .msg.ai .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px 10px 10px 2px;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       ПОЛЕ ВВОДА
       ═══════════════════════════════════════════════════════════════════════ */
    .input-area {
      padding: 1rem 1.5rem;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem;
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      padding: 0.6rem;
      font-family: inherit;
      font-size: 1rem;
      resize: none;
      outline: none;
    }

    .btn {
      background: var(--accent);
      border: none;
      border-radius: 4px;
      padding: 0.5rem 1.2rem;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.2s;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
    }

    .btn:hover {
      filter: brightness(1.1);
    }

    .btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       БОКОВАЯ ПАНЕЛЬ
       ═══════════════════════════════════════════════════════════════════════ */
    .panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
    }

    .p-title {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.8rem;
      display: block;
      font-size: 0.7rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .s-val {
      font-size: 1.1rem;
      color: var(--accent);
    }

    .s-label {
      font-size: 0.65rem;
      color: var(--muted);
    }

    .drop-zone {
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
    }

    .drop-zone:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    input[type="file"] {
      display: none;
    }

    .log-box {
      height: 120px;
      overflow-y: auto;
      background: #000;
      padding: 0.5rem;
      color: var(--muted);
      border-radius: 4px;
      white-space: pre-wrap;
      line-height: 1.4;
      font-size: 0.65rem;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .btn-sm {
      background: var(--border);
      color: var(--text);
      border: none;
      padding: 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.7rem;
      transition: background 0.2s;
    }

    .btn-sm:hover {
      background: #1a1b25;
    }

    .btn-danger {
      color: var(--error);
    }

    .btn-danger:hover {
      background: rgba(255, 85, 119, 0.1);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       СКРОЛЛБАР
       ═══════════════════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>

<body>
  <!-- ═══════════════════════════════════════════════════════════════════════
       РАЗМЕТКА
       ═══════════════════════════════════════════════════════════════════════ -->
  <div class="layout">
    <div class="chat-col">
      <div class="top-bar">
        <div class="logo">GRU CORE v4.1</div>
        <div class="status-row">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text" style="color:var(--muted)">Ожидание...</span>
        </div>
      </div>
      <div class="chat-flow" id="chat"></div>
      <div class="input-area">
        <div class="input-wrap">
          <textarea id="input" rows="1" placeholder="Загрузите .txt файл для обучения..." disabled></textarea>
          <button class="btn" id="send" disabled>SEND</button>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <span class="p-title">Data Source</span>
        <input type="file" id="file-in" accept=".txt">
        <div class="drop-zone" id="drop">Загрузить .txt файл</div>
        <div style="margin-top:0.5rem; font-size:0.65rem; color:var(--muted); text-align:center;">Диалоги, книги, статьи</div>
      </div>

      <div class="panel">
        <span class="p-title">Model Metrics</span>
        <div class="stats-grid">
          <div><div class="s-val" id="s-vocab">0</div><div class="s-label">Vocabulary</div></div>
          <div><div class="s-val" id="s-hidden">0</div><div class="s-label">Hidden</div></div>
          <div><div class="s-val" id="s-steps">0</div><div class="s-label">Training Steps</div></div>
          <div><div class="s-val" id="s-loss">0.000</div><div class="s-label">Avg Loss</div></div>
        </div>
      </div>

      <div class="panel">
        <span class="p-title">Model Actions</span>
        <div class="actions">
          <button class="btn-sm" id="save">Export</button>
          <button class="btn-sm" id="load">Import</button>
          <button class="btn-sm btn-danger" id="reset" style="grid-column: span 2;">Reset Model</button>
        </div>
      </div>

      <div class="panel">
        <span class="p-title">Training Control</span>
        <div class="actions">
          <button class="btn-sm" id="toggle-train">⏸ Пауза</button>
          <button class="btn-sm" id="force-save">💾 Сохранить</button>
        </div>
        <div style="margin-top:0.5rem; font-size:0.65rem; color:var(--muted);">
          Автосохранение: <span id="auto-save-status" style="color:var(--accent)">вкл</span>
        </div>
      </div>

      <div class="panel" style="flex:1; display:flex; flex-direction:column;">
        <span class="p-title">System Log</span>
        <div class="log-box" id="log">System ready.\n</div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       JAVASCRIPT
       ═══════════════════════════════════════════════════════════════════════ -->
  <script>
    // ═══════════════════════════════════════════════════════════════════════
    // МАТЕМАТИЧЕСКИЕ УТИЛИТЫ
    // ═══════════════════════════════════════════════════════════════════════

    const MathUtils = {
      sigmoid: x => 1 / (1 + Math.exp(-x)),
      dSigmoid: y => y * (1 - y),
      tanh: x => Math.tanh(x),
      dTanh: y => 1 - y * y,
      softmax: (logits) => {
        const max = Math.max(...logits);
        const exp = logits.map(v => Math.exp(v - max));
        const sum = exp.reduce((a, b) => a + b, 0);
        if (sum < 1e-10) return logits.map(() => 1 / logits.length);
        return exp.map(v => v / sum);
      },
      zeros: (n) => new Float32Array(n),
      xavierInit: (rows, cols) => {
        const limit = Math.sqrt(6 / (rows + cols));
        const arr = new Float32Array(rows * cols);
        for (let i = 0; i < arr.length; i++) {
          arr[i] = (Math.random() * 2 - 1) * limit;
        }
        return arr;
      },
      matVec: (W, rows, cols, vec) => {
        const out = new Float32Array(rows);
        for (let i = 0; i < rows; i++) {
          let sum = 0;
          const offset = i * cols;
          for (let j = 0; j < cols; j++) {
            sum += W[offset + j] * vec[j];
          }
          out[i] = sum;
        }
        return out;
      },
      clipGlobalNorm: (grads, maxNorm = 5.0) => {
        let normSq = 0;
        for (const g of grads) {
          for (let i = 0; i < g.length; i++) normSq += g[i] * g[i];
        }
        const norm = Math.sqrt(normSq);
        if (norm > maxNorm) {
          const scale = maxNorm / norm;
          for (const g of grads) {
            for (let i = 0; i < g.length; i++) g[i] *= scale;
          }
        }
        return norm;
      }
    };

    // ═══════════════════════════════════════════════════════════════════════
    // ТОКЕНИЗАТОР
    // ═══════════════════════════════════════════════════════════════════════

    class Tokenizer {
      constructor() {
        this.tokenToId = new Map();
        this.idToToken = new Map();
        this._addSpecialTokens();
      }

      _addSpecialTokens() {
        this._add('<PAD>');
        this._add('<UNK>');
        this._add('<BOS>');
        this._add('<EOS>');
      }

      _add(token) {
        if (!this.tokenToId.has(token)) {
          const id = this.tokenToId.size;
          this.tokenToId.set(token, id);
          this.idToToken.set(id, token);
        }
      }

      _normalize(text) {
        return text.toLowerCase()
          .replace(/[^а-яёa-z0-9\s\.\,\!\?\-\']/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      buildVocabulary(text, minFreq = 2) {
        const words = this._normalize(text).split(' ').filter(w => w.length > 0);
        const freq = new Map();
        for (const w of words) {
          freq.set(w, (freq.get(w) || 0) + 1);
        }
        for (const [word, count] of freq) {
          if (count >= minFreq) this._add(word);
        }
        for (let i = 0; i < words.length - 1; i++) {
          const a = words[i], b = words[i + 1];
          if (freq.get(a) >= minFreq && freq.get(b) >= minFreq) {
            this._add(`${a}‗${b}`);
          }
        }
        return words.length;
      }

      encode(text) {
        const words = this._normalize(text).split(' ').filter(w => w.length > 0);
        const ids = [];
        for (let i = 0; i < words.length; ) {
          let matched = false;
          if (i < words.length - 1) {
            const bigram = `${words[i]}‗${words[i + 1]}`;
            const id = this.tokenToId.get(bigram);
            if (id !== undefined) {
              ids.push(id);
              i += 2;
              matched = true;
            }
          }
          if (!matched) {
            const id = this.tokenToId.get(words[i]);
            ids.push(id !== undefined ? id : this.tokenToId.get('<UNK>'));
            i++;
          }
        }
        return ids;
      }

      decode(ids) {
        return ids
          .map(id => this.idToToken.get(id) || '<UNK>')
          .join(' ')
          .replace(/‗/g, ' ');
      }

      export() {
        return Array.from(this.tokenToId.entries());
      }

      import(data) {
        this.tokenToId = new Map(data);
        this.idToToken = new Map();
        for (const [token, id] of data) {
          this.idToToken.set(id, token);
        }
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // GRU НЕЙРОСЕТЬ
    // ═══════════════════════════════════════════════════════════════════════

    class GRUNetwork {
      constructor(vocabSize, hiddenSize = 96) {
        this.V = vocabSize;
        this.H = hiddenSize;
        this.Wz = MathUtils.xavierInit(this.V, this.H);
        this.Uz = MathUtils.xavierInit(this.H, this.H);
        this.bz = MathUtils.zeros(this.H);
        this.Wr = MathUtils.xavierInit(this.V, this.H);
        this.Ur = MathUtils.xavierInit(this.H, this.H);
        this.br = MathUtils.zeros(this.H);
        this.Wh = MathUtils.xavierInit(this.V, this.H);
        this.Uh = MathUtils.xavierInit(this.H, this.H);
        this.bh = MathUtils.zeros(this.H);
        this.Wy = MathUtils.xavierInit(this.H, this.V);
        this.by = MathUtils.zeros(this.V);
        this.adam = { t: 0, beta1: 0.9, beta2: 0.999, eps: 1e-8, lr: 0.002 };
        this.adamStates = {};
        this._initAdamStates();
        this.maxCacheSize = 100;
        this.cache = [];
        this.hiddenState = null;
      }

      _initAdamStates() {
        const weights = ['Wz', 'Uz', 'bz', 'Wr', 'Ur', 'br', 'Wh', 'Uh', 'bh', 'Wy', 'by'];
        const shapes = {
          Wz: [this.V, this.H], Uz: [this.H, this.H], bz: [this.H],
          Wr: [this.V, this.H], Ur: [this.H, this.H], br: [this.H],
          Wh: [this.V, this.H], Uh: [this.H, this.H], bh: [this.H],
          Wy: [this.H, this.V], by: [this.V]
        };
        for (const name of weights) {
          const [rows, cols] = shapes[name];
          const size = rows * (cols || 1);
          this.adamStates[name] = { m: MathUtils.zeros(size), v: MathUtils.zeros(size) };
        }
      }

      _getRow(W, rowId) {
        const H = this.H;
        return W.subarray(rowId * H, (rowId + 1) * H);
      }

      _cacheStep(step) {
        if (this.cache.length >= this.maxCacheSize) this.cache.shift();
        this.cache.push(step);
      }

      forward(tokenId, hidden) {
        const { V, H } = this;
        const x = this._getRow(this.Wz, tokenId);
        const Uz_h = MathUtils.matVec(this.Uz, H, H, hidden);
        const z = new Float32Array(H);
        for (let i = 0; i < H; i++) z[i] = MathUtils.sigmoid(x[i] + Uz_h[i] + this.bz[i]);
        const Ur_h = MathUtils.matVec(this.Ur, H, H, hidden);
        const r = new Float32Array(H);
        for (let i = 0; i < H; i++) r[i] = MathUtils.sigmoid(x[i] + Ur_h[i] + this.br[i]);
        const r_h = new Float32Array(H);
        for (let i = 0; i < H; i++) r_h[i] = r[i] * hidden[i];
        const Uh_rh = MathUtils.matVec(this.Uh, H, H, r_h);
        const hTilde = new Float32Array(H);
        for (let i = 0; i < H; i++) hTilde[i] = MathUtils.tanh(x[i] + Uh_rh[i] + this.bh[i]);
        const newHidden = new Float32Array(H);
        for (let i = 0; i < H; i++) newHidden[i] = (1 - z[i]) * hidden[i] + z[i] * hTilde[i];
        const logits = MathUtils.matVec(this.Wy, V, H, newHidden);
        for (let i = 0; i < V; i++) logits[i] += this.by[i];
        this._cacheStep({ tokenId, hidden: new Float32Array(hidden), x: new Float32Array(x), z: new Float32Array(z), r: new Float32Array(r), r_h: new Float32Array(r_h), hTilde: new Float32Array(hTilde), newHidden: new Float32Array(newHidden), logits: new Float32Array(logits) });
        return { hidden: newHidden, logits };
      }

      train(sequence, learningRate = null) {
        if (sequence.length < 2) return 0;
        const lr = learningRate || this.adam.lr;
        this.cache = [];
        let hidden = this.hiddenState ? new Float32Array(this.hiddenState) : MathUtils.zeros(this.H);
        for (let t = 0; t < sequence.length; t++) {
          const result = this.forward(sequence[t], hidden);
          hidden = result.hidden;
        }
        this.hiddenState = new Float32Array(hidden);
        const { V, H } = this;
        let dhNext = MathUtils.zeros(H);
        let totalLoss = 0;
        const grads = {
          Wz: MathUtils.zeros(V * H), Uz: MathUtils.zeros(H * H), bz: MathUtils.zeros(H),
          Wr: MathUtils.zeros(V * H), Ur: MathUtils.zeros(H * H), br: MathUtils.zeros(H),
          Wh: MathUtils.zeros(V * H), Uh: MathUtils.zeros(H * H), bh: MathUtils.zeros(H),
          Wy: MathUtils.zeros(H * V), by: MathUtils.zeros(V)
        };
        for (let t = this.cache.length - 1; t >= 0; t--) {
          const step = this.cache[t];
          const target = sequence[t];
          const probs = MathUtils.softmax(step.logits);
          const prob = probs[target] || 1e-10;
          totalLoss -= Math.log(prob);
          const dy = new Float32Array(V);
          for (let i = 0; i < V; i++) dy[i] = probs[i] - (i === target ? 1 : 0);
          const dhFromOutput = MathUtils.zeros(H);
          for (let i = 0; i < V; i++) {
            for (let j = 0; j < H; j++) {
              grads.Wy[j * V + i] += dy[i] * step.newHidden[j];
              dhFromOutput[j] += this.Wy[j * V + i] * dy[i];
            }
            grads.by[i] += dy[i];
          }
          const dhNew = new Float32Array(H);
          for (let i = 0; i < H; i++) dhNew[i] = dhNext[i] + dhFromOutput[i];
          const dhTilde = new Float32Array(H);
          for (let i = 0; i < H; i++) dhTilde[i] = dhNew[i] * step.z[i] * MathUtils.dTanh(step.hTilde[i]);
          const dz = new Float32Array(H);
          for (let i = 0; i < H; i++) dz[i] = dhNew[i] * (step.hTilde[i] - step.hidden[i]) * MathUtils.dSigmoid(step.z[i]);
          const dUh_rh = MathUtils.matVec(this.Uh, H, H, dhTilde);
          const dr = new Float32Array(H);
          for (let i = 0; i < H; i++) dr[i] = dUh_rh[i] * step.hidden[i] * MathUtils.dSigmoid(step.r[i]);
          const dhPrev = new Float32Array(H);
          for (let i = 0; i < H; i++) dhPrev[i] = dhNew[i] * (1 - step.z[i]) + dUh_rh[i] * step.r[i];
          for (let i = 0; i < H; i++) {
            grads.bz[i] += dz[i];
            grads.Wz[step.tokenId * H + i] += dz[i];
            for (let j = 0; j < H; j++) {
              grads.Uz[i * H + j] += dz[i] * step.hidden[j];
              dhPrev[j] += this.Uz[i * H + j] * dz[i];
            }
          }
          for (let i = 0; i < H; i++) {
            grads.br[i] += dr[i];
            grads.Wr[step.tokenId * H + i] += dr[i];
            for (let j = 0; j < H; j++) {
              grads.Ur[i * H + j] += dr[i] * step.hidden[j];
              dhPrev[j] += this.Ur[i * H + j] * dr[i];
            }
          }
          for (let i = 0; i < H; i++) {
            grads.bh[i] += dhTilde[i];
            grads.Wh[step.tokenId * H + i] += dhTilde[i];
            for (let j = 0; j < H; j++) grads.Uh[i * H + j] += dhTilde[i] * step.r_h[j];
          }
          dhNext = dhPrev;
        }
        MathUtils.clipGlobalNorm(Object.values(grads), 5.0);
        this.adam.t++;
        const { beta1, beta2, eps, t } = this.adam;
        const bias1 = 1 - Math.pow(beta1, t);
        const bias2 = 1 - Math.pow(beta2, t);
        for (const [name, grad] of Object.entries(grads)) {
          const state = this.adamStates[name];
          const weight = this[name];
          for (let i = 0; i < weight.length; i++) {
            state.m[i] = beta1 * state.m[i] + (1 - beta1) * grad[i];
            state.v[i] = beta2 * state.v[i] + (1 - beta2) * grad[i] * grad[i];
            const mHat = state.m[i] / bias1;
            const vHat = state.v[i] / bias2;
            weight[i] -= lr * mHat / (Math.sqrt(vHat) + eps);
          }
        }
        return totalLoss / sequence.length;
      }

      generate(seedSequence, maxLength = 50, temperature = 0.8, topK = 15) {
        const { V, H } = this;
        const EOS = 3;
        let hidden = this.hiddenState ? new Float32Array(this.hiddenState) : MathUtils.zeros(H);
        const output = [];
        let lastToken = seedSequence.length > 0 ? seedSequence[seedSequence.length - 1] : 2;
        for (const token of seedSequence) {
          const result = this.forward(token, hidden);
          hidden = result.hidden;
        }
        for (let i = 0; i < maxLength; i++) {
          const result = this.forward(lastToken, hidden);
          hidden = result.hidden;
          const logits = result.logits.map(l => l / temperature);
          const probs = MathUtils.softmax(logits);
          const indexed = probs.map((p, idx) => ({ p, idx })).sort((a, b) => b.p - a.p).slice(0, Math.min(topK, V));
          const sum = indexed.reduce((s, x) => s + x.p, 0);
          for (const x of indexed) x.p /= sum;
          const r = Math.random();
          let cumSum = 0;
          let nextToken = indexed[0].idx;
          for (const x of indexed) {
            cumSum += x.p;
            if (r <= cumSum) { nextToken = x.idx; break; }
          }
          if (nextToken === EOS) break;
          output.push(nextToken);
          lastToken = nextToken;
        }
        return output;
      }

      resetState() {
        this.hiddenState = null;
        this.cache = [];
      }

      export() {
        const data = { V: this.V, H: this.H, adam: { ...this.adam }, weights: {}, adamStates: {} };
        for (const name of ['Wz', 'Uz', 'bz', 'Wr', 'Ur', 'br', 'Wh', 'Uh', 'bh', 'Wy', 'by']) {
          data.weights[name] = Array.from(this[name]);
          data.adamStates[name] = { m: Array.from(this.adamStates[name].m), v: Array.from(this.adamStates[name].v) };
        }
        return data;
      }

      import(data) {
        this.V = data.V;
        this.H = data.H;
        this.adam = { ...this.adam };
        for (const [name, arr] of Object.entries(data.weights)) this[name] = new Float32Array(arr);
        this._initAdamStates();
        if (data.adamStates) {
          for (const [name, state] of Object.entries(data.adamStates)) {
            this.adamStates[name].m = new Float32Array(state.m);
            this.adamStates[name].v = new Float32Array(state.v);
          }
        }
      }

      getParamCount() {
        return this.V * this.H * 4 + this.H * this.H * 3 + this.H * 3 + this.V + this.H * this.V;
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // ПРИЛОЖЕНИЕ
    // ═══════════════════════════════════════════════════════════════════════

    const UI = {
      chat: document.getElementById('chat'),
      input: document.getElementById('input'),
      send: document.getElementById('send'),
      statusDot: document.getElementById('status-dot'),
      statusText: document.getElementById('status-text'),
      log: document.getElementById('log'),
      vocab: document.getElementById('s-vocab'),
      hidden: document.getElementById('s-hidden'),
      steps: document.getElementById('s-steps'),
      loss: document.getElementById('s-loss')
    };

    const Logger = {
      add: (msg) => {
        const time = new Date().toLocaleTimeString();
        UI.log.textContent += `[${time}] ${msg}\n`;
        UI.log.scrollTop = UI.log.scrollHeight;
      }
    };

    const Status = {
      set: (text, state = 'idle') => {
        UI.statusText.textContent = text;
        UI.statusDot.className = 'status-dot';
        if (state === 'active') UI.statusDot.classList.add('active');
        if (state === 'error') UI.statusDot.classList.add('error');
      }
    };

    let tokenizer = null;
    let network = null;
    let dataset = [];
    let trainIndex = 0;
    let isTraining = false;
    let trainingPaused = false;
    let autoSaveEnabled = true;

    function addMessage(text, isUser) {
      const msg = document.createElement('div');
      msg.className = `msg ${isUser ? 'user' : 'ai'}`;
      msg.innerHTML = `<div class="bubble">${text}</div>`;
      UI.chat.appendChild(msg);
      UI.chat.scrollTop = UI.chat.scrollHeight;
    }

    function saveToLocalStorage() {
      if (!autoSaveEnabled || !network || !tokenizer) return;
      try {
        const data = { tokenizer: tokenizer.export(), network: network.export(), trainIndex, timestamp: Date.now() };
        localStorage.setItem('gru-model-v4', JSON.stringify(data));
        Logger.add('✓ Автосохранение');
      } catch (e) {
        Logger.add(`✗ Не сохранено: ${e.message}`);
      }
    }

    function loadFromLocalStorage() {
      try {
        const raw = localStorage.getItem('gru-model-v4');
        if (!raw) return false;
        const data = JSON.parse(raw);
        tokenizer = new Tokenizer();
        tokenizer.import(data.tokenizer);
        network = new GRUNetwork(data.network.V, data.network.H);
        network.import(data.network);
        trainIndex = data.trainIndex || 0;
        UI.vocab.textContent = tokenizer.tokenToId.size;
        UI.hidden.textContent = network.H;
        UI.steps.textContent = network.adam.t;
        UI.loss.textContent = '0.000';
        UI.input.disabled = false;
        UI.input.placeholder = 'Напишите сообщение...';
        UI.send.disabled = false;
        Status.set('Модель загружена (авто)', 'active');
        Logger.add(`✓ Модель восстановлена (${new Date(data.timestamp).toLocaleString()})`);
        return true;
      } catch (e) {
        Logger.add(`✗ Ошибка загрузки: ${e.message}`);
        return false;
      }
    }

    async function trainBatch(batchSize = 10) {
      if (trainingPaused) { setTimeout(() => trainBatch(batchSize), 500); return; }
      if (!network || !dataset || trainIndex >= dataset.length) {
        isTraining = false;
        Status.set('Готов к работе', 'active');
        Logger.add('Обучение завершено');
        if (autoSaveEnabled) saveToLocalStorage();
        return;
      }
      let batchLoss = 0;
      const end = Math.min(trainIndex + batchSize, dataset.length);
      for (let i = trainIndex; i < end; i++) { const loss = network.train(dataset[i]); batchLoss += loss; }
      trainIndex = end;
      UI.vocab.textContent = tokenizer.tokenToId.size;
      UI.hidden.textContent = network.H;
      UI.steps.textContent = network.adam.t;
      UI.loss.textContent = (batchLoss / (end - trainIndex + batchSize)).toFixed(4);
      if (network.adam.t % 100 === 0) {
        Logger.add(`Step ${network.adam.t}, Loss: ${(batchLoss / (end - trainIndex)).toFixed(4)}`);
        if (autoSaveEnabled) saveToLocalStorage();
      }
      setTimeout(() => trainBatch(batchSize), 0);
    }

    document.getElementById('drop').onclick = () => document.getElementById('file-in').click();

    document.getElementById('file-in').onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      Logger.add(`Загрузка файла: ${file.name}`);
      Status.set('Обработка текста...', 'active');
      try {
        const text = await file.text();
        tokenizer = new Tokenizer();
        const wordCount = tokenizer.buildVocabulary(text, 2);
        Logger.add(`Словарь: ${tokenizer.tokenToId.size} токенов из ${wordCount} слов`);
        dataset = text.split('\n').map(line => tokenizer._normalize(line)).filter(line => line.length > 5)
          .map(line => { const ids = tokenizer.encode(line); return [2, ...ids, 3]; }).filter(seq => seq.length > 3);
        Logger.add(`Подготовлено ${dataset.length} последовательностей`);
        network = new GRUNetwork(tokenizer.tokenToId.size, 96);
        Logger.add(`Сеть: ${network.getParamCount().toLocaleString()} параметров`);
        UI.vocab.textContent = tokenizer.tokenToId.size;
        UI.hidden.textContent = network.H;
        UI.input.disabled = false;
        UI.input.placeholder = 'Напишите сообщение...';
        UI.send.disabled = false;
        isTraining = true;
        Status.set('Обучение...', 'active');
        trainBatch(20);
      } catch (err) {
        Logger.add(`Ошибка: ${err.message}`);
        Status.set('Ошибка', 'error');
      }
    };

    UI.send.onclick = () => {
      const text = UI.input.value.trim();
      if (!text || !network || !tokenizer) return;
      addMessage(text, true);
      UI.input.value = '';
      const inputIds = tokenizer.encode(text);
      const sequence = [2, ...inputIds, 3];
      network.train(sequence, 0.0005);
      const outputIds = network.generate([2, ...inputIds], 60, 0.85, 20);
      const response = tokenizer.decode(outputIds).trim();
      setTimeout(() => { addMessage(response || '...', false); }, 100);
      UI.steps.textContent = network.adam.t;
      if (autoSaveEnabled) saveToLocalStorage();
    };

    UI.input.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); UI.send.onclick(); }
    };

    UI.input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    document.getElementById('save').onclick = () => {
      if (!network || !tokenizer) { Logger.add('Нет модели для экспорта'); return; }
      const data = { tokenizer: tokenizer.export(), network: network.export() };
      const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `gru-model-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      Logger.add('Модель экспортирована');
    };

    document.getElementById('load').onclick = () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = async (e) => {
        try {
          const data = JSON.parse(await e.target.files[0].text());
          tokenizer = new Tokenizer();
          tokenizer.import(data.tokenizer);
          network = new GRUNetwork(data.network.V, data.network.H);
          network.import(data.network);
          UI.vocab.textContent = tokenizer.tokenToId.size;
          UI.hidden.textContent = network.H;
          UI.steps.textContent = network.adam.t;
          UI.input.disabled = false;
          UI.input.placeholder = 'Напишите сообщение...';
          UI.send.disabled = false;
          Status.set('Модель загружена', 'active');
          Logger.add('Модель импортирована успешно');
        } catch (err) {
          Logger.add(`Ошибка импорта: ${err.message}`);
          Status.set('Ошибка импорта', 'error');
        }
      };
      input.click();
    };

    document.getElementById('reset').onclick = () => {
      if (!network) return;
      network.resetState();
      trainIndex = 0;
      localStorage.removeItem('gru-model-v4');
      UI.steps.textContent = '0';
      UI.loss.textContent = '0.000';
      Logger.add('Состояние сброшено');
    };

    document.getElementById('toggle-train').onclick = () => {
      trainingPaused = !trainingPaused;
      const btn = document.getElementById('toggle-train');
      if (trainingPaused) {
        btn.textContent = '▶ Продолжить';
        Status.set('Обучение на паузе', 'active');
        Logger.add('Обучение приостановлено');
      } else {
        btn.textContent = '⏸ Пауза';
        Status.set('Обучение...', 'active');
        Logger.add('Обучение продолжено');
      }
    };

    document.getElementById('force-save').onclick = () => { saveToLocalStorage(); };

    if (!loadFromLocalStorage()) {
      Logger.add('Система готова к загрузке данных');
      Status.set('Ожидание файла', 'idle');
    } else {
      UI.input.disabled = false;
      UI.send.disabled = false;
    }
  </script>
</body>
</html>
